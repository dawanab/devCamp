<!-- Using what you've learned so far, insert the quote "Innovation distinguishes 
    between a leader and a follower" into the first div. Then insert the name of 
    the author ("Steve Jobs") into the second div. -->

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Exercise</title>
    </head>
    <body>
        <div id="quote"></div>
        <div id="author"></div>
    </body>

    <script>
        const quote = document.getElementById("quote");
        quote.innerHTML = "Innovation distinguishes between a leader and a follower";

        const author = document.getElementById("author");
        author.innerHTML = "Steve Jobs";
    </script>
    </html>
