<!-- Coding Exercise
Make a variable named dom and select the below div by it's id and 
insert the phrase "Hello world" into the innerHTML -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline onclick vs addEventListener</title>
</head>
<body>
    <div id="getMe"></div>
</body>
<script>
    const dom = document.getElementById("getMe");
    dom.innerHTML = "Hello World!";
</script>
</html>
