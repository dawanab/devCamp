<!-- Coding Exercise
We need to add a margin of 20px to the div below but some of the code is missing. 
Fix the JavaScript to properly select the div and add 20px. -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add and Remove CSS with Vanilla JavaScript</title>
</head>
<body>
    <div id="target">Add 20px to my margin</div>
</body>

<script>
    let card = document.getElementById("target");
    card.style.margin = "20px";
</script>
</html>
