<script>
    // Ex. I ------------------------>
    const someObj = {
        name: "Kennedy"
    }
    console.log("Hi ", someObj, "After object");


    // Ex. II ------------------------>
    // If you have an array of objects or complex data structures
    const playerNames = [
        {name: "Kennedy", age: 2},
        {name: "Dallas", age: 2},
        {name: "Biscuits", age: 6}
    ]
    console.table(playerNames);


    // Ex. III (log an error) -------->
    console.error("oops!");


    // Ex. IV (log a warning) -------->
    console.warn("Something is about to go wrong, bud...");
</script>
